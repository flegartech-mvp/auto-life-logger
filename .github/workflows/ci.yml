name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:chrome
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: auto-life-logger-extension
          path: dist/*.zip
